name: Build & Commit Theme Site

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the listing actually changes
    paths:
      - "**/*.json"
      - "scripts/generate_site.py"
      - ".github/workflows/build-site.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate index.html
        env:
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: python3 scripts/generate_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "index.html unchanged, nothing to commit"
          else
            git commit -m "chore: auto-update theme listing [skip ci]"
            git push
          fi
